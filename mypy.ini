# ── LOCAL_AI_ENGINE — mypy configuration ─────────────────────────────
# Usage: mypy core/ main.py
# Run: python -m mypy core/ main.py --config-file mypy.ini

[mypy]
python_version = 3.13
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False       # don't fail on missing hints (yet)
check_untyped_defs = True           # but DO check functions that have hints
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True
exclude = (?x)|
    core/backups/|
    core/liquidity_magnet/|
    tests/

# Third-party libraries without stubs — don't complain
[mypy-ccxt.*]
ignore_missing_imports = True

[mypy-aiogram.*]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True
