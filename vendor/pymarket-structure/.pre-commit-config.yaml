# Pre-commit hooks — run on `git commit`.
# Install: `uv run pre-commit install`
# Run manually on all files: `uv run pre-commit run --all-files`
# Docs: https://pre-commit.com

repos:
  # ---------------------------------------------------------------------------
  # Generic hygiene hooks — whitespace, file endings, merge conflicts, etc.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: ^frontend/src/assets/data/
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------------------------------------------------------------------------
  # Ruff — lint + format (official Astral pre-commit repo)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      # Lint. `--fix` auto-corrects fixable issues; `--exit-non-zero-on-fix`
      # ensures the commit still fails so you re-stage the fixes deliberately.
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      # Formatter (replaces black).
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Pyright — strict type check (local hook using our pinned dev dep)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict)
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false   # pyright walks the project itself
        require_serial: true
