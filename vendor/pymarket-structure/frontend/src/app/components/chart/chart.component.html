<div class="chart-wrapper" #chartContainer></div>

@if (tradeTooltip(); as ttt) {
	<app-trade-tooltip [trade]="ttt.trade" [x]="ttt.x" [y]="ttt.y" [pinned]="ttt.pinned" />
}

@if (tooltip(); as tt) {
	<div
		class="divergence-tooltip"
		[class.bullish]="tt.type === 'bullish'"
		[class.bearish]="tt.type === 'bearish'"
		[style.left.px]="tt.x"
		[style.top.px]="tt.y"
	>
		<div class="tooltip-title">{{ tt.title }}</div>
		<div class="tooltip-body">{{ tt.body }}</div>
	</div>
}
